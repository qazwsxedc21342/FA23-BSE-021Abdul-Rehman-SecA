services:
  # Backend Service
  - type: web
    name: doctor-hub-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        value: doctor_hub_access_secret_key_2024_secure_token_min_32_chars
      - key: JWT_REFRESH_SECRET
        value: doctor_hub_refresh_secret_key_2024_secure_token_min_32_chars
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
    healthCheckPath: /api/health

  # Frontend Service
  - type: web
    name: doctor-hub-frontend
    env: static
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
